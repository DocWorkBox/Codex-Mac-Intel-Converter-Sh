name: Build Intel DMG

on:
  workflow_dispatch:
    inputs:
      codex_dmg_url:
        description: "Direct download URL for source Codex.dmg"
        required: false
        default: "https://persistent.oaistatic.com/codex-app-prod/Codex.dmg"
        type: string
      output_name:
        description: "Optional output DMG file name"
        required: false
        default: "CodexAppMacIntel.dmg"
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Download source DMG
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/_input"
          curl -fL "${{ inputs.codex_dmg_url }}" -o "${{ github.workspace }}/_input/Codex.dmg"

      - name: Run Intel converter
        run: |
          set -euo pipefail
          chmod +x ./build-intel.sh
          ./build-intel.sh "${{ github.workspace }}/_input/Codex.dmg"

      - name: Normalize output file name
        run: |
          set -euo pipefail
          if [ "${{ inputs.output_name }}" != "CodexAppMacIntel.dmg" ]; then
            mv -f "./CodexAppMacIntel.dmg" "./${{ inputs.output_name }}"
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: intel-dmg
          path: "./${{ inputs.output_name }}"
          if-no-files-found: error
          retention-days: 7

      - name: Publish DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: intel-dmg-latest
          RELEASE_TITLE: Latest Intel DMG Build
          OUTPUT_NAME: ${{ inputs.output_name }}
          SOURCE_DMG_URL: ${{ inputs.codex_dmg_url }}
        run: |
          set -euo pipefail

          notes_file="${RUNNER_TEMP}/release-notes.md"
          cat > "$notes_file" <<EOF
          Automated latest Intel DMG build.

          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Source DMG: ${SOURCE_DMG_URL}
          - Asset: ${OUTPUT_NAME}
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --latest
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file "$notes_file" \
              --latest
          fi

          gh release upload "$RELEASE_TAG" "./${OUTPUT_NAME}" --clobber

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs
          path: |
            ./log.txt
            ./.tmp
          if-no-files-found: warn
          retention-days: 7
